# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: 357542025142.dkr.ecr.eu-west-1.amazonaws.com/demo-app:latest
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
